services:
  - name: smart-community-ai
    type: web
    runtime: python
    plan: free
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: VISION_MODEL_NAME
        value: sentence-transformers/clip-ViT-B-32
      - key: VISION_CONFIDENCE_THRESHOLD
        value: "0.24"
      - key: VISION_MAX_IMAGE_BYTES
        value: "2097152"

  - name: smart-community-web
    type: web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        sync: false
      - key: WEATHERSTACK_API_KEY
        sync: false
      - key: WEATHERSTACK_BASE_URL
        value: http://api.weatherstack.com
      - key: WEATHERSTACK_ENABLED
        value: "true"
      - key: WEATHERSTACK_MONTHLY_LIMIT
        value: "90"
      - key: ZENSERP_API_KEY
        sync: false
      - key: ZENSERP_BASE_URL
        value: https://app.zenserp.com/api/v2/search
      - key: ZENSERP_ENABLED
        value: "true"
      - key: ZENSERP_MONTHLY_LIMIT
        value: "48"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_FAMILY
        value: "4"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: BBMP_EMAIL_TO
        value: comm@bbmp.gov.in
      - key: CORS_ORIGIN
        sync: false
      - key: ALLOW_ROLE_TOKEN_ISSUE
        value: "false"
